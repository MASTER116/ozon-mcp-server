version: "3.9"

services:
  ozon-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      - OZON_CLIENT_ID=${OZON_CLIENT_ID}
      - OZON_API_KEY=${OZON_API_KEY}
      - POSTGRES_DSN=postgresql://ozon:${POSTGRES_PASSWORD:-secret}@postgres:5432/ozon_mcp
      - REDIS_URL=redis://redis:6379/0
      - TRANSPORT=${TRANSPORT:-stdio}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ozon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ozon_mcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ozon -d ozon_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
