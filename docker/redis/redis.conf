# Redis production configuration for Ozon MCP Server
#
# NOTE: This file is a REFERENCE. The actual configuration is passed via
# command-line arguments in docker-compose.prod.yml because Redis does not
# support environment variable substitution in config files.
#
# To use this file directly, replace YOUR_REDIS_PASSWORD with the actual
# password and mount it: -v ./redis.conf:/usr/local/etc/redis/redis.conf:ro

# Network — bind to container interface only
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60
protected-mode yes

# Authentication — REPLACE before using
requirepass YOUR_REDIS_PASSWORD

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF — more durable for rate limit state)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots (backup safety net)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Security — disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command KEYS ""
rename-command DEBUG ""
rename-command SLAVEOF ""
rename-command REPLICAOF ""
