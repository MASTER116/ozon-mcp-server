# Redis production configuration for Ozon MCP Server

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Authentication
requirepass ${REDIS_PASSWORD}

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF — more durable for rate limit state)
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots (backup safety net)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
